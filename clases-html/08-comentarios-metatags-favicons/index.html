<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Con la etiqueta link y el atributo rel igual a 'icon' podemos pasarle un icono a la pestaña de nuestra pagina-->
    <link rel="icon" href="/clases-html/04-imagenes/linux.png" type="image/png">



    <!--Las etiquetas meta son importantes para el SEO de nuestra página, tambien para definir como se va a mostrar nuestra página
cuando un enlace la llame en una red social: -->

     <!-- meta charset le dice a nuestro documento que codificacion de caracteres utilizará. UFT-8 hace referencia 
    a todos los caracteres del mundo. Es la condificación universal-->
    <meta charset="UTF-8">
    

   <!--Este meta viewport indica que nuestra página html tomará como su ancho, todo el ancho del dispositivo donde se abra la pagina --> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <meta name="description" content="esta pagina trata de los permisos especiales en GNU Linux">

    <!--Palabras clave de mi pagina para SEO-->
    <meta name="keywords" content="chmod, SUID, bit SUID">

    <meta name=author" content ="Sebastian Ibarguen">


    <!-- Evita que google pueda guardar una copia de mi página en caché-->
    <meta name="robots" content="noarchive">

    <!-- Con esta etiqueta, las imagenes de mi pagina no se indexan. No se recomienda usarla a exepción de casos específicos-->
    <meta name="robots" content="noimageindex">

    <!-- Este es el titulo de la pagina que aparece en la pestaña del navegador-->
     <title>Metatags y favicons</title>


     <!-- metatags OG -->
      <meta name="OG:TITLE" content="">
      <meta name="OG:IMAGE" content="">
      <meta name="OG:DESCRIPTION" content="">
      <meta name="OG:url" content="">
</head>

<body>

    <h1>Uníco encabezado h1 de mi hipervinculo</h1>

</body>

</html>
