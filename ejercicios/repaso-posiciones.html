<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="posiciones.css">
    <title>Posiciones html</title>
</head>
<body>

<div class="posicion-estatica">
    <p>Esta es una posicion estatica</p>
</div>

<div class="posicion-fija">
    <p>Esta es una posicion fija</p>
</div>


<div class="posicion-absoulta">
    <p>Esta es una posicion absoluta</p>
</div>

<div class="posicion-relativa">
    <p>Esta es una posicion relativa</p>

    <button class="btn-absoluto">Boton absoluto</button>
</div>

<div class="posicion-sticky">
    <p>Esta es una posicion sticky</p>
</div>


</body>
</html>
