<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <!-- <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=close" /> -->


    <link rel="stylesheet" href="style.css" />
    <title>Sidebar Menu</title>
</head>

<body>

    <!-- <span class="material-symbols-outlined">Apps</span> -->

    <aside class="sidebar">
        <form class="sidebar__form">
            <input type="checkbox" id="open-menu-sidebar">
            <label for="open-menu-sidebar" class="material-symbols-outlined">Close</label>
        </form>
        
        <picture class="sidebar__picture">
            <img src="img/luchito-small.jpg" alt="logo luchito diaz" width="100%">
            <source srcset="img/neymar-small.png" media="(max-width: 57.5rem)">
        </picture> 

        <div class="sidebar__nav">
            <ul> 
                <li class="sidebar__item">
                    <span class="material-symbols-outlined">Notifications</span>
                    <a href="#">Notifications</a>
                </li>

                 <li class="sidebar__item">
                    <span class="material-symbols-outlined">mail</span>
                    <a href="#">Messages</a>
                </li>

                 <li class="sidebar__item">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <a href="#">Shopping Cart</a>
                </li>
                 <li class="sidebar__item">
                    <span class="material-symbols-outlined">account_balance</span>
                    <a href="#">Account Balance</a>
                </li>

                 <li class="sidebar__item">
                    <span class="material-symbols-outlined">Settings</span>
                    <a href="#">Settings</a>
                </li>
            </ul>
        </div>

        <div class="sidebar__profile"> 
            <li class="sidebar__item">
                    <img src="img/neymar-small.png" alt="imagen settings" class="profile_img"></img>
                    <span class="profile-option">profile</span>
                </li>

                <li class="sidebar__item">
                    <span class="material-symbols-outlined">logout</span>
                    <a href="#">logout</a>

                </li>
        </div>
    </aside>

</body>

</html>
